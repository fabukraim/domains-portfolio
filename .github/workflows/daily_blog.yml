name: Daily Blog Publisher

on:
  schedule:
    # يعمل كل يوم الساعة 8:00 صباحاً بتوقيت الأردن (05:00 بتوقيت جرينتش)
    - cron: '0 5 * * *'
  workflow_dispatch: # يسمح بتشغيل السكربت يدوياً من GitHub

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    
    # إعطاء الصلاحية للبوت لكي يتمكن من رفع الملفات
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests

    - name: Verify Dependencies
      run: |
        python -c "import requests; print('Requests version:', requests.__version__)"

    - name: Run Blog Generator Script
      run: python blog_generator.py

    - name: Commit and Push New Article
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add articles/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-published daily article" && git push)
